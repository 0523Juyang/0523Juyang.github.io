<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>個人簡介網頁</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }
        header {
            background-color: #4CAF50;
            color: white;
            text-align: center;
            padding: 1em 0;
        }
        main {
            padding: 1em;
        }
        section {
            margin-bottom: 2em;
        }
        h2 {
            color: #333;
        }
        ul {
            list-style-type: none;
            padding: 0;
        }
        ul li {
            margin: 0.5em 0;
        }
        a {
            color: #4CAF50;
            text-decoration: none;
        }
        a:hover {
            text-decoration: underline;
        }
        img {
            max-width: 100%;
            height: auto;
        }
        footer {
            background-color: #333;
            color: white;
            text-align: center;
            padding: 1em 0;
            position: fixed;
            width: 100%;
            bottom: 0;
        }
    </style>
</head>
<body>
    <header>
        <h1>個人簡介</h1>
    </header>
    <main>
        <section id="profile">
            <h2>個人資訊</h2>
            <p>這裡是你的個人簡介。</p>
        </section>
        <section id="social-media">
            <h2>社交媒體連結</h2>
            <ul>
                <li><a href="https://www.facebook.com/me/">Facebook</a></li>
                <!-- 可以添加其他社交媒體連結 -->
            </ul>
        </section>
        <section id="photos">
            <h2>個人照片</h2>
            <img src="your-photo.jpg" alt="個人照片">
            <!-- 可以添加其他照片 -->
        </section>
        <section id="activities">
            <h2>活動紀錄</h2>
            <p>這裡是你的活動紀錄。</p>
        </section>
    </main>
    <footer>
        <p>&copy; 2024 個人簡介網頁</p>
    </footer>
    <script>
        // 如需添加互動功能，可以在這裡添加JavaScript代碼
    </script>
</body>
</html>
