<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>個人簡介網頁</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>個人簡介</h1>
    </header>
    <main>
        <section id="profile">
            <h2>個人資訊</h2>
            <p>這裡是你的個人簡介。</p>
        </section>
        <section id="social-media">
            <h2>社交媒體連結</h2>
            <ul>
                <li><a href="https://www.facebook.com/me/">Facebook</a></li>
                <!-- 可以添加其他社交媒體連結 -->
            </ul>
        </section>
        <section id="photos">
            <h2>個人照片</h2>
            <img src="your-photo.jpg" alt="個人照片">
            <!-- 可以添加其他照片 -->
        </section>
        <section id="activities">
            <h2>活動紀錄</h2>
            <p>這裡是你的活動紀錄。</p>
        </section>
    </main>
    <footer>
        <p>&copy; 2024 個人簡介網頁</p>
    </footer>
    <script src="scripts.js"></script>
</body>
</html>
